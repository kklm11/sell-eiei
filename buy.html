<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งซื้อบัญชี X</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">🏰 ยามว่างนิ</div>
</header>

<section class="buy-page">
    <h1>สั่งซื้อบัญชี X</h1>

    <div class="buy-container">

        <!-- กล่องสินค้า -->
        <div class="card">

            <img src="images/x.png" alt="บัญชี X">

            <h3>บัญชี X</h3>

            <p>ราคา 30 บาท</p>

          <p id="stock">พร้อมใช้งาน...</p>

           <a href="https://line.me/ti/p/YyQv7bHfuL" target="_blank" class="btn-buy">
    💬 ติดต่อผ่าน LINE
</a>

        </div>

        <!-- กล่องชำระเงิน -->
        <div class="card payment-card">

            <h3>💳 ช่องทางชำระเงิน</h3>

            <img src="images/qr.jpg" alt="QR พร้อมเพย์" class="qr">

           <p class="promptpay">PromptPay : 0618648759</p>

<hr class="line">

<p class="notice">
💬 หลังโอนเงินและส่งสลิปผ่าน LINE
ระบบจะตรวจสอบและส่งข้อมูลบัญชีให้
</p>
<h3>📤 อัปโหลดสลิป</h3>

<input type="file" id="slip" accept="image/*">

<br><br>

<button class="btn-buy">
ส่งสลิป
</button>
        </div>

  

</section>
<script src="js/animation.js"></script>
</body>
</html>
