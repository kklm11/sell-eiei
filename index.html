<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#2563eb;
padding:20px;
text-align:center;
}

header h1{
font-size:35px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.3);
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.price{
font-size:28px;
color:#22c55e;
margin:15px 0;
font-weight:bold;
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

footer{
padding:20px;
text-align:center;
opacity:.7;
}
</style>

</head>

<body>

<header>
<h1>🛒 Account Shop</h1>
<p>ร้านขายสินค้าออนไลน์</p>
</header>

<div class="container">

<div class="card">
<img src="https://picsum.photos/400/250?1">
<h2>สินค้า A</h2>
<p>รายละเอียดสินค้า</p>
<div class="price">450 บาท</div>
<button onclick="window.open('https://line.me','_blank')">
ติดต่อซื้อ
</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?2">
<h2>สินค้า B</h2>
<p>รายละเอียดสินค้า</p>
<div class="price">790 บาท</div>
<button onclick="window.open('https://line.me','_blank')">
ติดต่อซื้อ
</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?3">
<h2>สินค้า C</h2>
<p>รายละเอียดสินค้า</p>
<div class="price">1290 บาท</div>
<button onclick="window.open('https://line.me','_blank')">
ติดต่อซื้อ
</button>
</div>

</div>

<footer>
© 2026 Account Shop
</footer>

</body>
</html>
